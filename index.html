<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEPSE Terminal</title>
  <meta name="description" content="NEPSE Terminal dashboard for tracking trades, portfolio positions, SIP activity, and cash ledger updates." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="NEPSE Terminal" />
  <meta property="og:description" content="Track your NEPSE trades, positions, SIP system, and performance from one terminal-style dashboard." />
  <meta property="og:image" content="assets/display.jpg" />
  <meta property="og:image:type" content="image/x-icon" />
  <meta property="og:image:alt" content="NEPSE Terminal logo" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="NEPSE Terminal" />
  <meta name="twitter:description" content="Track your NEPSE trades, positions, SIP system, and performance from one terminal-style dashboard." />
  <meta name="twitter:image" content="assets/display.jpg" />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<aside class="sidebar open" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark"><img src="assets/favicon.ico" alt="NEPSE Terminal logo" /></div>
    <div class="brand-text">
      <div class="brand-name">NEPSE Terminal</div>
    </div>
  </div>


  <nav class="sidebar-nav">
    <div class="nav-group-label">OVERVIEW</div>
    <button class="nav-item active" data-view="dashboard">
      <svg viewBox="0 0 16 16" width="14"><rect x="1" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".7"/><rect x="9" y="1" width="6" height="6" rx="1" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1" fill="currentColor" opacity=".4"/></svg>
      Dashboard
    </button>
    <button class="nav-item" data-view="earnings">
      <svg viewBox="0 0 16 16" width="14"><path d="M2 12h12M3 10l2-2 2 1 3-4 3 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Earnings
    </button>
    <button class="nav-item" data-view="trades">
      <svg viewBox="0 0 16 16" width="14"><polyline points="1,12 5,7 9,9 15,2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="15" cy="2" r="1.5" fill="currentColor"/></svg>
      Trades
    </button>
    <button class="nav-item" data-view="longterm">
      <svg viewBox="0 0 16 16" width="14"><path d="M1 13 Q4 6 8 8 Q12 10 15 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M13 2h2v2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Long-Term
    </button>
    <button class="nav-item" data-view="sip">
      <svg viewBox="0 0 16 16" width="14"><circle cx="8" cy="8" r="6" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 5v3l2 2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      SIP System
    </button>

    <div class="nav-group-label">RECORDS</div>
    <button class="nav-item" data-view="pasttrades">
      <svg viewBox="0 0 16 16" width="14"><rect x="1" y="3" width="14" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M5 1v4M11 1v4M1 8h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Past Trades
    </button>
    <button class="nav-item" data-view="cashledger">
      <svg viewBox="0 0 16 16" width="14"><rect x="1" y="3" width="14" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M1 7h14" stroke="currentColor" stroke-width="1.5"/><circle cx="5" cy="11" r="1" fill="currentColor"/></svg>
      Cash Ledger
    </button>

    <div class="nav-group-label">TOOLS</div>
    <button class="nav-item" data-view="calculator">
      <svg viewBox="0 0 16 16" width="14"><rect x="2" y="1" width="12" height="14" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="5" y="3" width="6" height="3" rx=".5" fill="currentColor" opacity=".4"/><circle cx="5.5" cy="9" r="1" fill="currentColor"/><circle cx="8" cy="9" r="1" fill="currentColor"/><circle cx="10.5" cy="9" r="1" fill="currentColor"/><circle cx="5.5" cy="12" r="1" fill="currentColor"/><circle cx="8" cy="12" r="1" fill="currentColor"/><circle cx="10.5" cy="12" r="1" fill="currentColor"/></svg>
      Calculator
    </button>
    <button class="nav-item" data-view="settings">
      <svg viewBox="0 0 16 16" width="14"><circle cx="8" cy="8" r="2.5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Settings
    </button>
  </nav>

</aside>

<main class="main-area">
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" aria-label="Toggle sidebar">
        <span></span><span></span><span></span>
      </button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
    </div>
    <div class="topbar-right">
      <div class="topbar-segment">
        <div class="market-pill topbar-market" id="marketPill">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusLabel">NEPSE</span>
          <span id="statusTime" class="mono">--:--:--</span>
          <button class="privacy-eye-btn" id="privacyToggleBtn" title="Hide / show portfolio values" aria-label="Toggle value privacy">VISIBLE</button>
          <button class="privacy-eye-btn rs-prefix-btn" id="rsToggleBtn" title="Show / hide Rs prefix" aria-label="Toggle Rs prefix">₹ Prefix</button>
        </div>
      </div>

      <div class="topbar-segment header-target-box" title="Progress">
        <span class="header-target-val mono" id="headerTargetValue">0%</span>
        <div class="header-target-track"><div class="header-target-fill" id="headerTargetFill"></div></div>
      </div>

      <div class="topbar-segment header-cash-box" title="Cash balance">
        <span class="header-cash-lbl">CASH BALANCE</span>
        <span class="header-cash-val mono" id="headerCash">Rs 0</span>
      </div>

      <div class="topbar-segment topbar-tools">
        <div class="topbar-quick-grid">
          <button class="tb-btn tb-btn-ghost tb-btn-icon tb-btn-symbol tb-btn-textual" id="calcPopupBtn" title="Open floating calculator" aria-label="Open floating calculator">
            <svg viewBox="0 0 16 16" width="10" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="1.5" width="12" height="13" rx="2"/><rect x="4.5" y="3.5" width="7" height="2.5" rx=".6" fill="currentColor" opacity=".35"/><circle cx="5.5" cy="9" r=".8" fill="currentColor"/><circle cx="8" cy="9" r=".8" fill="currentColor"/><circle cx="10.5" cy="9" r=".8" fill="currentColor"/><circle cx="5.5" cy="11.8" r=".8" fill="currentColor"/><circle cx="8" cy="11.8" r=".8" fill="currentColor"/><circle cx="10.5" cy="11.8" r=".8" fill="currentColor"/></svg>
          </button>
          <button class="tb-btn tb-btn-ghost tb-btn-icon tb-btn-symbol tb-btn-textual" id="downloadDataBtn" title="Download encrypted CSV backup" aria-label="Export backup">
            <svg viewBox="0 0 14 14" width="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 1v8M4 6l3 3 3-3" stroke-linecap="round"/><path d="M2 11h10" stroke-linecap="round"/></svg>
          </button>
          <button class="tb-btn tb-btn-ghost tb-btn-icon tb-btn-symbol tb-btn-textual" id="updateLtpBtn" title="Update LTP prices from CSV" aria-label="Update LTP prices from CSV">
            <svg viewBox="0 0 14 14" width="9"><path d="M12 1.4A6 6 0 1 0 13.2 7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="10,0 13.2,0 13.2,3.2" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <button class="tb-btn tb-btn-ghost tb-btn-icon tb-btn-symbol tb-btn-textual" id="uploadDataBtn" title="Restore from encrypted CSV backup" aria-label="Import backup">
            <svg viewBox="0 0 14 14" width="11" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M7 9V1M4 4l3-3 3 3" stroke-linecap="round"/><path d="M2 11h10" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <span class="ltp-status mono" id="ltpStatus"></span>
      <input type="file" id="ltpFileInput" accept=".csv" style="display:none" />
      <input type="file" id="dataFileInput" accept=".csv" style="display:none" />
    </div>
  </header>

  <div class="view-container">
    <div class="view" id="view-dashboard"></div>
    <div class="view hidden" id="view-earnings"></div>
    <div class="view hidden" id="view-trades"></div>
    <div class="view hidden" id="view-longterm"></div>
    <div class="view hidden" id="view-sip"></div>
    <div class="view hidden" id="view-pasttrades"></div>
    <div class="view hidden" id="view-cashledger"></div>
    <div class="view hidden" id="view-calculator"></div>
    <div class="view hidden" id="view-settings"></div>
  </div>
</main>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<div class="modal-overlay hidden" id="modalOverlay">
  <div class="modal-box" id="modalBox"></div>
</div>

<div class="alert-bar hidden" id="alertBar">
  <span class="alert-icon">▸</span>
  <span id="alertText"></span>
  <button id="alertClose">✕</button>
</div>

<div class="calc-float hidden" id="calcFloat" role="dialog" aria-modal="false" aria-label="Floating calculator"></div>

<script src="core/engine.js"></script>
<script src="views/modal.js"></script>
<script src="views/watchlist.js"></script>
<script src="views/portfolio-table.js"></script>
<script src="views/dashboard.js"></script>
<script src="views/earnings.js"></script>
<script src="views/trades.js"></script>
<script src="views/longterm.js"></script>
<script src="views/sip.js"></script>
<script src="views/pasttrades.js"></script>
<script src="views/cashledger-view.js"></script>
<script src="views/calculator-view.js"></script>
<script src="views/settings-view.js"></script>
<script src="app.js"></script>
</body>
</html>
