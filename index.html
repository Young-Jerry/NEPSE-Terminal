<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SM-Terminal</title>
  <meta name="description" content="SM-Terminal portfolio dashboard for tracking forex trades, active positions, and execution performance." />
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <link rel="apple-touch-icon" href="assets/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<aside class="sidebar open" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-mark"><img src="assets/favicon.ico" alt="SM-Terminal logo" /></div>
    <div class="brand-text"><div class="brand-name">SM-Terminal</div></div>
  </div>

  <nav class="sidebar-nav" id="sidebarNav">
    <details class="nav-section" open><summary>MAIN</summary>
      <button class="nav-item active" data-view="dashboard">Dashboard</button>
      <button class="nav-item" data-view="calendar">Performance Calendar</button>
      <button class="nav-item" data-view="journal">Journal Vault</button>
    </details>
    <details class="nav-section" open><summary>TRADING</summary>
      <button class="nav-item" data-view="execution">Execution</button>
      <button class="nav-item" data-view="learning">Learning</button>
      <button class="nav-item" data-view="demoprogress">Demo Progress</button>
      <button class="nav-item" data-view="propchallenge">Prop Challenge</button>
    </details>
    <details class="nav-section" open><summary>NEPSE</summary>
      <button class="nav-item" data-view="portfolio">Portfolio</button>
      <button class="nav-item" data-view="watchlist">Watchlist</button>
      <button class="nav-item" data-view="notes">Notes</button>
    </details>
    <details class="nav-section" open><summary>LIFE OS</summary>
      <button class="nav-item" data-view="discipline">Discipline</button>
      <button class="nav-item" data-view="habits">Habits</button>
      <button class="nav-item" data-view="reading">Reading</button>
      <button class="nav-item" data-view="skillprogress">Skill Progress</button>
    </details>
    <details class="nav-section" open><summary>SYSTEM</summary>
      <button class="nav-item" data-view="settings">Settings</button>
    </details>
  </nav>
</aside>

<main class="main-area">
  <header class="topbar">
    <div class="topbar-left"><h1 class="page-title" id="pageTitle">Dashboard</h1><span id="pageContext" class="page-context mono">MAIN / DASHBOARD</span></div>
    <div class="topbar-center mono">
      <span>KTM <strong id="ktmTime">--:--</strong></span>
      <span>NY <strong id="nyTime">--:--</strong></span>
      <span id="sessionIndicator" class="session-indicator">Session: --</span>
    </div>
    <div class="topbar-right">
      <button class="tb-btn" id="calcPopupBtn" title="Command">⌘</button>
      <button class="tb-btn" id="themeToggleBtn" title="Toggle Theme">◐</button>
      <button class="tb-btn" id="privacyToggleBtn" title="Toggle Privacy">VISIBLE</button>
      <button class="tb-btn" id="rsToggleBtn" title="Toggle Rs Prefix">₹</button>
      <button class="tb-btn" id="uploadDataBtn" title="Import">↑</button>
      <button class="tb-btn" id="downloadDataBtn" title="Export">↓</button>
      <button class="tb-btn" id="updateLtpBtn" title="Update LTP">⟳</button>
      <input type="file" id="ltpFileInput" accept=".csv" style="display:none" />
      <input type="file" id="dataFileInput" accept=".csv" style="display:none" />
      <span class="ltp-status mono" id="ltpStatus"></span>
    </div>
  </header>

  <div class="view-container fixed-layout-shell">
    <div class="view" id="view-dashboard"></div>
    <div class="view hidden" id="view-calendar"></div>
    <div class="view hidden" id="view-journal"></div>
    <div class="view hidden" id="view-execution"></div>
    <div class="view hidden" id="view-learning"></div>
    <div class="view hidden" id="view-demoprogress"></div>
    <div class="view hidden" id="view-propchallenge"></div>
    <div class="view hidden" id="view-portfolio"></div>
    <div class="view hidden" id="view-watchlist"></div>
    <div class="view hidden" id="view-notes"></div>
    <div class="view hidden" id="view-discipline"></div>
    <div class="view hidden" id="view-habits"></div>
    <div class="view hidden" id="view-reading"></div>
    <div class="view hidden" id="view-skillprogress"></div>
    <div class="view hidden" id="view-trading"></div>
    <div class="view hidden" id="view-trades"></div>
    <div class="view hidden" id="view-forexmarkets"></div>
    <div class="view hidden" id="view-pasttrades"></div>
    <div class="view hidden" id="view-calculator"></div>
    <div class="view hidden" id="view-settings"></div>
  </div>
</main>

<div class="sidebar-backdrop" id="sidebarBackdrop"></div>
<div class="modal-overlay hidden" id="modalOverlay"><div class="modal-box" id="modalBox"></div></div>
<div class="alert-bar hidden" id="alertBar"><span class="alert-icon">▸</span><span id="alertText"></span><button id="alertClose">✕</button></div>
<div class="calc-float hidden" id="calcFloat" role="dialog" aria-modal="false" aria-label="Floating calculator"></div>

<script src="core/engine.js"></script><script src="views/modal.js"></script><script src="views/watchlist.js"></script><script src="views/portfolio-table.js"></script><script src="views/dashboard.js"></script><script src="views/lifeos.js"></script><script src="views/trading.js"></script><script src="views/forexmarkets.js"></script><script src="views/trades.js"></script><script src="views/pasttrades.js"></script><script src="views/calculator-view.js"></script><script src="views/settings-view.js"></script><script src="app.js"></script>
</body>
</html>
